    <style>
        :root {
            --navy: #11143c;
            --ink: #171743;
            --pearl-white: #f7f7fb;
            --pure-white: #ffffff;
            --lavender: #b7b3eb;
            --soft-lavender: #d9d7f4;
            --violet: #5f54bc;
            --gray: #53586f;
            --light-gray: #a4abc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--pearl-white);
            font-family: "Montserrat", sans-serif;
        }

        body {
            color: var(--navy);
        }

        /* 背景样式完全保留 */
        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at 52% 116%,
                    rgba(95, 84, 188, 0.22) 0%,
                    rgba(178, 177, 232, 0.12) 24%,
                    rgba(248, 249, 252, 0) 62%),
                linear-gradient(135deg, #fbfbfd 0%, #f5f5fa 50%, #fafafe 100%);
        }

        .hero-section::before {
            content: "";
            position: absolute;
            inset: -20%;
            background:
                radial-gradient(circle at 18% 12%,
                    rgba(255, 255, 255, 0.95) 0%,
                    rgba(255, 255, 255, 0) 28%),
                radial-gradient(circle at 80% 8%,
                    rgba(255, 255, 255, 0.8) 0%,
                    rgba(255, 255, 255, 0) 32%);
            z-index: 0;
            pointer-events: none;
        }

        /* 背景斜向玻璃光带 */
        .glass-beam {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            transform-origin: center;
            border-radius: 28px;
            mix-blend-mode: multiply;
        }

        .beam-main-left {
            width: 42vw;
            height: 70px;
            left: 23vw;
            top: 19vh;
            transform: rotate(46deg);
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.55) 18%, rgba(173, 170, 230, 0.3) 42%, rgba(88, 78, 176, 0.88) 68%, rgba(255, 255, 255, 0.28) 100%);
            box-shadow: 18px 18px 38px rgba(74, 63, 158, 0.22), inset 0 0 0 1px rgba(255, 255, 255, 0.58), inset 0 16px 24px rgba(255, 255, 255, 0.38);
        }

        .beam-main-left::after {
            content: "";
            position: absolute;
            inset: 8px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-left-color: rgba(115, 103, 200, 0.26);
            border-bottom-color: rgba(95, 84, 188, 0.18);
        }

        .beam-left-thin-1,
        .beam-left-thin-2 {
            width: 42vw;
            height: 1px;
            left: 22vw;
            top: 18vh;
            transform: rotate(46deg);
            background: rgba(95, 84, 188, 0.22);
        }

        .beam-left-thin-2 {
            top: 20.3vh;
            left: 21.2vw;
            opacity: 0.45;
        }

        .beam-right-wide {
            width: 34vw;
            height: 76px;
            right: 18vw;
            top: 20vh;
            transform: rotate(-44deg);
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.72), rgba(208, 206, 242, 0.32) 45%, rgba(150, 145, 221, 0.22) 100%);
            box-shadow: 16px 18px 38px rgba(95, 84, 188, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.66), inset 0 16px 25px rgba(255, 255, 255, 0.5);
        }

        .beam-right-thin-1,
        .beam-right-thin-2,
        .beam-right-thin-3 {
            width: 37vw;
            height: 1px;
            right: 9vw;
            top: 20vh;
            transform: rotate(-44deg);
            background: rgba(95, 84, 188, 0.16);
        }

        .beam-right-thin-2 {
            top: 22.4vh;
            right: 8vw;
            opacity: 0.6;
        }

        .beam-right-thin-3 {
            top: 24.7vh;
            right: 7vw;
            opacity: 0.35;
        }

        #wave-container {
            position: absolute;
            bottom: -3vh;
            left: 0;
            width: 100vw;
            height: 58vh;
            z-index: 2;
            pointer-events: none;
            overflow: visible;
        }

        /* ==== 顶部导航 (完全复刻) ==== */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2.1rem 4.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .mini-logo {
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mini-logo:hover {
            transform: scale(1.15) rotate(2deg);
        }

        .mini-logo svg {
            width: 42px;
            height: auto;
            display: block;
            filter: drop-shadow(0 8px 14px rgba(95, 84, 188, 0.12));
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 3.9rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 3.35rem;
        }

        .nav-menu li {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--navy);
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .nav-menu li:hover {
            color: var(--violet);
        }

        .nav-menu a {
            color: inherit;
            text-decoration: none;
        }

        .nav-menu li::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: var(--violet);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-menu li.active::after,
        .nav-menu li:hover::after {
            opacity: 1;
        }

        .connect-btn {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            border: 1px solid rgba(17, 20, 60, 0.2);
            border-radius: 999px;
            padding: 0.72rem 1.4rem;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--navy);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.36);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .connect-btn:hover {
            border-color: rgba(17, 20, 60, 0.55);
            background: rgba(255, 255, 255, 0.8);
        }

        .connect-btn .ring-icon {
            width: 10px;
            height: 10px;
            border: 1px solid var(--navy);
            border-radius: 50%;
            position: relative;
        }

        .connect-btn .ring-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            height: 3px;
            transform: translate(-50%, -50%);
            background: var(--navy);
            border-radius: 50%;
        }

        /* ==== Projects 内容区样式 ==== */
        .projects-wrapper {
            position: absolute;
            top: 18vh;
            left: 8.6vw;
            right: 8.6vw;
            bottom: 8vh;
            z-index: 10;
            overflow-y: auto;
            padding-bottom: 4rem;
            /* 隐藏滚动条但允许滚动 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .projects-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* 动画定义 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-family: "Montserrat", sans-serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--navy);
            margin-bottom: 3rem;
            text-shadow: 0 10px 22px rgba(17, 20, 60, 0.05);
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 16px 32px rgba(95, 84, 188, 0.05);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .project-card:hover {
            /* transform: translateY(-8px); */
            background: rgba(255, 255, 255, 0.65);
            box-shadow: 0 20px 40px rgba(95, 84, 188, 0.1);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-year {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--violet);
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            display: block;
        }

        .project-name {
            font-family: "Noto Serif SC", serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }

        .project-desc {
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .project-tags {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.65rem;
            padding: 0.4rem 0.8rem;
            border-radius: 99px;
            border: 1px solid rgba(95, 84, 188, 0.2);
            color: var(--violet);
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.5);
        }

        .mini-logo {
            position: relative;
            z-index: 100;
        }
        /* 移动端汉堡按钮 */
        .hamburger-btn {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 18px;
            cursor: pointer;
            z-index: 100;
            position: relative;
        }
        .hamburger-btn span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--navy);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        body.menu-open { overflow: hidden !important; }
        body.menu-open .hamburger-btn span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        body.menu-open .hamburger-btn span:nth-child(2) { opacity: 0; }
        body.menu-open .hamburger-btn span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        @media (max-width: 980px) {
            header {
                padding: 1.6rem 1.5rem;
            }

            .hamburger-btn { display: flex; }
            .nav-container {
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(247, 247, 251, 0.92); backdrop-filter: blur(12px);
                flex-direction: column; justify-content: center; align-items: center;
                opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 90;
            }
            body.menu-open .nav-container { opacity: 1; pointer-events: auto; }
            .nav-menu { flex-direction: column; align-items: center; gap: 2.5rem; }
            .nav-menu li { font-size: 1.2rem; }

            .projects-wrapper {
                top: 12vh;
                left: 5vw;
                right: 5vw;
                bottom: 2vh;
            }

            .page-title {
                font-size: 2.2rem;
                margin-bottom: 2rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .project-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

    <script>
        const projects = [{
            title: "ShangCloud",
            desc: "全新设计的全公益云变量存储、多人联机服务提供平台。为创作者提供稳定、高效的联机解决方案。",
            tags: ["Cloud", "Web APP", "Turbowarp"],
            url: "https://api.yearnstudio.cn"
        },
        {
            title: "小盒子社区",
            desc: "新一代Scratch社区。致力于为Scratch爱好者提供一个纯净、自由的交流与分享空间。",
            tags: ["Community", "Scratch"],
            url: "https://sbox.yearnstudio.cn/"
        },
        {
            title: "Scratch社区卡片",
            desc: "为你的 GitHub Profile 或个人网站生成精美的 Scratch 社区数据统计卡片。",
            tags: ["Community", "Scratch", "README"],
            url: "https://github.com/YearnstudioYangyi/scratch-readme-stats"
        },
        {
            title: "AxtFrame",
            desc: "全新的基于AST抽象语法树的Turbowarp扩展开发框架",
            tags: ["Community", "Scratch"],
            url: "https://github.com/YearnstudioHorizon/AxtFrame"
        },
        {
            title: "星野梦代",
            desc: "QQ入群邮箱验证承担，第三方/官方混合QQ机器人",
            tags: ["QQ", "Email"],
            url: "#"
        },
        {
            title: "星火工具箱",
            desc: "一个基于Wails+Vue的聚合系统工具与功能管理的桌面应用",
            tags: ["Deving", "Desktop", "Windows"],
            url: "#"
        }]

        document.addEventListener("DOMContentLoaded", () => {
            // 汉堡菜单交互
            const hamburger = document.querySelector('.hamburger-btn');
            if (hamburger) {
                hamburger.addEventListener('click', () => {
                    document.body.classList.toggle('menu-open');
                });
            }

            // 插入作品卡片
            const cards = document.getElementById("project-cards")
            cards.innerHTML = ""
            projects.forEach(element => {
                let tags = ""
                element.tags.forEach(tag => {
                    tags += `<span class="tag">${tag}</span>`
                });
                cards.innerHTML += `<a href="${element.url}" style="text-decoration: none; color: inherit; display: block;">
            <div class="project-card" >
            <h2 class="project-name">${element.title}</h2>
            <p class="project-desc">${element.desc}</p>
            <div class="project-tags">
                ${tags}
            </div>
          </div>`
            });

            const svgns = "http://www.w3.org/2000/svg";
            const container = document.getElementById("wave-container");

            const NUM = 42; // 大幅减少波浪数量以优化性能
            const S = 60;   // 减少分段数
            let fillPath;
            let time = 0;
            let W, H;
            let precomputed = [];
            let fillPrecomputed = [];

            function spline(pts) {
                let d = "M" + pts[0][0].toFixed(1) + "," + pts[0][1].toFixed(1);
                for (let i = 0; i < pts.length - 1; i++) {
                    const p0 = pts[i === 0 ? 0 : i - 1];
                    const p1 = pts[i];
                    const p2 = pts[i + 1];
                    const p3 = (i + 2 >= pts.length) ? pts[pts.length - 1] : pts[i + 2];
                    const c1x = p1[0] + (p2[0] - p0[0]) / 6;
                    const c1y = p1[1] + (p2[1] - p0[1]) / 6;
                    const c2x = p2[0] - (p3[0] - p1[0]) / 6;
                    const c2y = p2[1] - (p3[1] - p1[1]) / 6;
                    d += "C" + c1x.toFixed(1) + "," + c1y.toFixed(1) + " " + c2x.toFixed(1) + "," + c2y.toFixed(1) + " " + p2[0].toFixed(1) + "," + p2[1].toFixed(1);
                }
                return d;
            }

            function initWaves() {
                container.innerHTML = "";
                precomputed = [];
                fillPrecomputed = [];

                W = window.innerWidth;
                H = window.innerHeight * 0.58;
                container.setAttribute("viewBox", `0 0 ${W} ${H}`);

                const defs = document.createElementNS(svgns, "defs");
                const glow = document.createElementNS(svgns, "filter");
                glow.setAttribute("id", "waveGlow");
                glow.setAttribute("x", "-10%"); glow.setAttribute("y", "-40%");
                glow.setAttribute("width", "120%"); glow.setAttribute("height", "180%");
                const blur = document.createElementNS(svgns, "feGaussianBlur");
                blur.setAttribute("stdDeviation", "2.5");
                blur.setAttribute("result", "blur");
                const merge = document.createElementNS(svgns, "feMerge");
                const m1 = document.createElementNS(svgns, "feMergeNode"); m1.setAttribute("in", "blur");
                const m2 = document.createElementNS(svgns, "feMergeNode"); m2.setAttribute("in", "SourceGraphic");
                merge.appendChild(m1); merge.appendChild(m2);
                glow.appendChild(blur); glow.appendChild(merge);
                defs.appendChild(glow);
                container.appendChild(defs);

                fillPath = document.createElementNS(svgns, "path");
                fillPath.setAttribute("fill", "rgba(95,84,188,0.085)");
                fillPath.setAttribute("filter", "url(#waveGlow)");
                container.appendChild(fillPath);

                const cx1 = W * 0.41, s1 = W * 0.115;
                const cx2 = W * 0.72, s2 = W * 0.105;
                const valley = W * 0.56, valleyS = W * 0.09;

                // Precompute fill path base values
                for (let j = 0; j <= S; j++) {
                    const x = -80 + (j * (W + 160)) / S;
                    const g1 = Math.exp(-0.5 * ((x - cx1) / s1) ** 2);
                    const g2 = Math.exp(-0.5 * ((x - cx2) / s2) ** 2);
                    fillPrecomputed.push({ x, g1, g2, baseY: H * 0.82 - H * 0.22 * g1 - H * 0.16 * g2 });
                }
                for (let i = 0; i < NUM; i++) {
                    const t = i / (NUM - 1);
                    const path = document.createElementNS(svgns, "path");
                    path.setAttribute("fill", "none");
                    path.setAttribute("stroke", `rgba(95,84,188,${(0.045 + t * 0.33).toFixed(3)})`);
                    path.setAttribute("stroke-width", t > 0.72 ? "1.15" : "0.85");
                    if (i > NUM * 0.75) path.setAttribute("filter", "url(#waveGlow)");
                    container.appendChild(path);

                    const baseY = H * (1.02 - t * 0.54);
                    const amp = H * (0.09 + Math.pow(t, 1.35) * 0.34);

                    const iData = {
                        el: path,
                        t: t,
                        m1: 1.6 + t * 5.2,
                        m2: 0.7 + t * 3.1,
                        pts: []
                    };

                    for (let j = 0; j <= S; j++) {
                        const x = -80 + (j * (W + 160)) / S;
                        const g1 = Math.exp(-0.5 * ((x - cx1) / s1) ** 2);
                        const g2 = Math.exp(-0.5 * ((x - cx2) / s2) ** 2);
                        const gv = Math.exp(-0.5 * ((x - valley) / valleyS) ** 2);
                        const leftDip = Math.exp(-0.5 * ((x - W * 0.15) / (W * 0.11)) ** 2) * H * 0.12 * (0.2 + t);
                        const y0 = baseY - amp * (g1 * 1.1 + g2 * 0.9) + amp * gv * 0.46 + leftDip;
                        iData.pts.push({ x, y0 });
                    }
                    precomputed.push(iData);
                }
            }

            function updateWaves() {
                for (let i = 0; i < NUM; i++) {
                    const data = precomputed[i];
                    const pts = data.pts.map(p => {
                        const micro = Math.sin(p.x * 0.0065 + data.t * 5.4 + time) * data.m1 +
                                    Math.sin(p.x * 0.012 - data.t * 4.1 + time * 0.5) * data.m2;
                        return [p.x, p.y0 + micro];
                    });
                    data.el.setAttribute("d", spline(pts));
                }

                const fillPts = fillPrecomputed.map(p => {
                    return [p.x, p.baseY + Math.sin(p.x * 0.007 + time * 0.8) * 4];
                });
                fillPath.setAttribute("d", spline(fillPts) + "L" + (W + 120) + "," + (H + 60) + "L-120," + (H + 60) + "Z");
            }

            function tick() {
                time += 0.005;
                updateWaves();
                requestAnimationFrame(tick);
            }

            initWaves();
            tick();

            let timer;
            window.addEventListener("resize", () => {
                clearTimeout(timer);
                timer = setTimeout(initWaves, 200);
            });
        });
    </script>
</body>

</html>
