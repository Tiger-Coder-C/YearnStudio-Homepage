        background:

      .beam-main-left {
        width: 42vw; height: 70px; left: 23vw; top: 19vh; transform: rotate(46deg);

      }
      .beam-main-left::after {
        content: ""; position: absolute; inset: 8px 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.45); border-left-color: rgba(115, 103, 200, 0.26); border-bottom-color: rgba(95, 84, 188, 0.18);

      .beam-right-wide {

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const svgns = "http://www.w3.org/2000/svg";
        const container = document.getElementById("wave-container");

        function buildWaves() {
          container.innerHTML = "";
          const W = window.innerWidth;
          const H = window.innerHeight * 0.58;
          container.setAttribute("viewBox", `0 0 ${W} ${H}`);

          const defs = document.createElementNS(svgns, "defs");
          const glow = document.createElementNS(svgns, "filter");
          glow.setAttribute("id", "waveGlow");
          glow.setAttribute("x", "-10%"); glow.setAttribute("y", "-40%");
          glow.setAttribute("width", "120%"); glow.setAttribute("height", "180%");

          const blur = document.createElementNS(svgns, "feGaussianBlur");
          blur.setAttribute("stdDeviation", "2.5");
          blur.setAttribute("result", "blur");

          const merge = document.createElementNS(svgns, "feMerge");
          const m1 = document.createElementNS(svgns, "feMergeNode");
          m1.setAttribute("in", "blur");
          const m2 = document.createElementNS(svgns, "feMergeNode");
          m2.setAttribute("in", "SourceGraphic");

          merge.appendChild(m1); merge.appendChild(m2); glow.appendChild(blur); glow.appendChild(merge);
          defs.appendChild(glow); container.appendChild(defs);

          function spline(pts) {
            let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
            for (let i = 0; i < pts.length - 1; i++) {
              const p0 = pts[Math.max(0, i - 1)]; const p1 = pts[i]; const p2 = pts[i + 1]; const p3 = pts[Math.min(pts.length - 1, i + 2)];
              const c1x = p1[0] + (p2[0] - p0[0]) / 6; const c1y = p1[1] + (p2[1] - p0[1]) / 6;
              const c2x = p2[0] - (p3[0] - p1[0]) / 6; const c2y = p2[1] - (p3[1] - p1[1]) / 6;
              d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
            }
            return d;
          }

          const NUM = 104; const S = 150;
          for (let i = 0; i < NUM; i++) {
            const t = i / (NUM - 1);
            const baseY = H * (1.02 - t * 0.54);
            const amp = H * (0.09 + Math.pow(t, 1.35) * 0.34);
            const cx1 = W * 0.41; const s1 = W * 0.115;
            const cx2 = W * 0.72; const s2 = W * 0.105;
            const valley = W * 0.56; const valleyS = W * 0.09;
            const pts = [];

            for (let j = 0; j <= S; j++) {
              const x = -80 + (j * (W + 160)) / S;
              const g1 = Math.exp(-0.5 * ((x - cx1) / s1) ** 2);
              const g2 = Math.exp(-0.5 * ((x - cx2) / s2) ** 2);
              const gv = Math.exp(-0.5 * ((x - valley) / valleyS) ** 2);
              const leftDip = Math.exp(-0.5 * ((x - W * 0.15) / (W * 0.11)) ** 2) * H * 0.12 * (0.2 + t);
              const micro = Math.sin(x * 0.0065 + t * 5.4) * (1.6 + t * 5.2) + Math.sin(x * 0.012 - t * 4.1) * (0.7 + t * 3.1);
              const y = baseY - amp * (g1 * 1.1 + g2 * 0.9) + amp * gv * 0.46 + leftDip + micro;
              pts.push([x, y]);
            }

            const path = document.createElementNS(svgns, "path");
            path.setAttribute("d", spline(pts)); path.setAttribute("fill", "none");
            path.setAttribute("stroke", `rgba(95,84,188,${(0.045 + t * 0.33).toFixed(3)})`);
            path.setAttribute("stroke-width", t > 0.72 ? "1.15" : "0.85");
            if (i > 78) path.setAttribute("filter", "url(#waveGlow)");
            container.appendChild(path);
          }
        }
        buildWaves();
        let timer;
        window.addEventListener("resize", () => {
          clearTimeout(timer); timer = setTimeout(buildWaves, 160);
        });
      });
    </script>
  </body>
</html>
