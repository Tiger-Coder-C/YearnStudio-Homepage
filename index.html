  <style>
    :root {
      --navy: #11143c;
      --ink: #171743;
      --pearl-white: #f7f7fb;
      --pure-white: #ffffff;
      --lavender: #b7b3eb;
      --soft-lavender: #d9d7f4;
      --violet: #5f54bc;
      --gray: #53586f;
      --light-gray: #a4abc4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--pearl-white);
      font-family: "Montserrat", sans-serif;
    }

    body {
      color: var(--navy);
    }

    .hero-section {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 116%,
          rgba(95, 84, 188, 0.22) 0%,
          rgba(178, 177, 232, 0.12) 24%,
          rgba(248, 249, 252, 0) 62%),
        linear-gradient(135deg, #fbfbfd 0%, #f5f5fa 50%, #fafafe 100%);
    }

    .hero-section::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 18% 12%,
          rgba(255, 255, 255, 0.95) 0%,
          rgba(255, 255, 255, 0) 28%),
        radial-gradient(circle at 80% 8%,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(255, 255, 255, 0) 32%);
      z-index: 0;
      pointer-events: none;
    }

    /* 背景斜向玻璃光带 */
    .glass-beam {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      transform-origin: center;
      border-radius: 28px;
      mix-blend-mode: multiply;
    }

    .beam-main-left {
      width: 42vw;
      height: 70px;
      left: 23vw;
      top: 19vh;
      transform: rotate(46deg);
      animation: beamFloat 12s ease-in-out infinite;
      background:
        linear-gradient(90deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.55) 18%,
          rgba(173, 170, 230, 0.3) 42%,
          rgba(88, 78, 176, 0.88) 68%,
          rgba(255, 255, 255, 0.28) 100%);
      box-shadow:
        18px 18px 38px rgba(74, 63, 158, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.58),
        inset 0 16px 24px rgba(255, 255, 255, 0.38);
    }

    .beam-main-left::after {
      content: "";
      position: absolute;
      inset: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-left-color: rgba(115, 103, 200, 0.26);
      border-bottom-color: rgba(95, 84, 188, 0.18);
    }

    .beam-left-thin-1,
    .beam-left-thin-2 {
      width: 42vw;
      height: 1px;
      left: 22vw;
      top: 18vh;
      transform: rotate(46deg);
      background: rgba(95, 84, 188, 0.22);
      animation: beamFloat 14s ease-in-out infinite;
    }

    .beam-left-thin-2 {
      top: 20.3vh;
      left: 21.2vw;
      opacity: 0.45;
    }

    .beam-right-wide {
      width: 34vw;
      height: 76px;
      right: 18vw;
      top: 20vh;
      transform: rotate(-44deg);
      animation: beamFloatReverse 15s ease-in-out infinite;
      background:
        linear-gradient(90deg,
          rgba(255, 255, 255, 0.72),
          rgba(208, 206, 242, 0.32) 45%,
          rgba(150, 145, 221, 0.22) 100%);
      box-shadow:
        16px 18px 38px rgba(95, 84, 188, 0.12),
        inset 0 0 0 1px rgba(255, 255, 255, 0.66),
        inset 0 16px 25px rgba(255, 255, 255, 0.5);
    }

    .beam-right-thin-1,
    .beam-right-thin-2,
    .beam-right-thin-3 {
      width: 37vw;
      height: 1px;
      right: 9vw;
      top: 20vh;
      transform: rotate(-44deg);
      background: rgba(95, 84, 188, 0.16);
      animation: beamFloatReverse 18s ease-in-out infinite;
    }

    .beam-right-thin-2 {
      top: 22.4vh;
      right: 8vw;
      opacity: 0.6;
    }

    .beam-right-thin-3 {
      top: 24.7vh;
      right: 7vw;
      opacity: 0.35;
    }

    .beam-vertical-left,
    .beam-vertical-mid {
      position: absolute;
      z-index: 1;
      top: 35vh;
      width: 72px;
      height: 52vh;
      border-radius: 26px;
      animation: verticalBeamFloat 10s ease-in-out infinite;
      background:
        linear-gradient(90deg,
          rgba(255, 255, 255, 0.74),
          rgba(201, 198, 238, 0.34),
          rgba(255, 255, 255, 0.5));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.65),
        18px 16px 32px rgba(95, 84, 188, 0.1);
      pointer-events: none;
    }

    .beam-vertical-left {
      left: 45.8vw;
    }

    .beam-vertical-mid {
      left: 50.4vw;
      width: 55px;
      opacity: 0.72;
    }

    .beam-vertical-left::after,
    .beam-vertical-mid::after {
      content: "";
      position: absolute;
      top: 0;
      right: 12px;
      width: 1px;
      height: 100%;
      background: rgba(95, 84, 188, 0.16);
    }

    /* 底部动态波纹 SVG 容器 */
    #wave-container {
      position: absolute;
      bottom: -3vh;
      left: 0;
      width: 100vw;
      height: 58vh;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    /* 顶部导航 */
    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 2.1rem 4.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
    }

    .mini-logo svg {
      width: 42px;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 14px rgba(95, 84, 188, 0.12));
    }

    .nav-container {
      display: flex;
      align-items: center;
      gap: 3.9rem;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 3.35rem;
    }

    .nav-menu li {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--navy);
      cursor: pointer;
      position: relative;
    }

    .nav-menu a {
      color: inherit;
      text-decoration: none;
    }

    .nav-menu li.active::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background-color: var(--violet);
      border-radius: 50%;
    }

    /* 动画定义 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      50% {
        transform: translate(-50%, -48%) rotate(1deg);
      }
      100% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
    }

    @keyframes beamFloat {
      0%, 100% {
        transform: rotate(46deg) translate(0, 0);
      }
      50% {
        transform: rotate(46deg) translate(10px, -10px);
      }
    }

    @keyframes beamFloatReverse {
      0%, 100% {
        transform: rotate(-44deg) translate(0, 0);
      }
      50% {
        transform: rotate(-44deg) translate(-10px, -10px);
      }
    }

    @keyframes verticalBeamFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .connect-btn {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      border: 1px solid rgba(17, 20, 60, 0.2);
      border-radius: 999px;
      padding: 0.72rem 1.4rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--navy);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.36);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .connect-btn:hover {
      border-color: rgba(17, 20, 60, 0.55);
      background: rgba(255, 255, 255, 0.8);
    }

    .connect-btn .ring-icon {
      width: 10px;
      height: 10px;
      border: 1px solid var(--navy);
      border-radius: 50%;
      position: relative;
    }

    .connect-btn .ring-icon::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 3px;
      transform: translate(-50%, -50%);
      background: var(--navy);
      border-radius: 50%;
    }

    /* 左侧内容区 */
    .left-content {
      position: absolute;
      top: 51.2%;
      left: 8.6vw;
      transform: translateY(-50%);
      z-index: 10;
      width: fit-content;
    }

    .name-wrapper {
      display: flex;
      flex-direction: column;
      width: max-content;
    }

    .name-cn {
      font-family: "Noto Serif SC", serif;
      /* font-size: clamp(5.6rem, 6.45vw, 8rem); */
      font-size: clamp(3.5rem, 4.45vw, 5.5rem);
      font-weight: 700;
      color: var(--navy);
      line-height: 0.95;
      margin-bottom: 0.75rem;
      letter-spacing: 0.08em;
      text-shadow: 0 10px 22px rgba(17, 20, 60, 0.05);
      white-space: nowrap;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .name-en {
      font-family: "Montserrat", sans-serif;
      font-size: 1.55rem;
      font-weight: 200;
      letter-spacing: 0.58em;
      color: rgba(17, 20, 60, 0.48);
      line-height: 1;
      width: 100%;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
    }

    .subtitle {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      color: rgba(17, 20, 60, 0.65);
      margin-top: 2.05rem;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
    }

    .desc {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--gray);
      margin-top: 0.85rem;
      line-height: 1.75;
      max-width: 330px;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s both;
    }

    .explore-link {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 2.25rem;
      cursor: pointer;
    }

    .explore-link span {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--navy);
    }

    .explore-line {
      width: 70px;
      height: 1px;
      background-color: var(--navy);
      position: relative;
      transition: width 0.3s ease;
    }

    .explore-line::before {
      content: "";
      position: absolute;
      right: 33px;
      top: -4px;
      width: 8px;
      height: 8px;
      border-top: 1px solid var(--navy);
      border-right: 1px solid var(--navy);
      transform: rotate(45deg);
    }

    .explore-link:hover .explore-line {
      width: 110px;
    }

    /* 中心 Logo */
    .center-visual {
      position: absolute;
      top: 52%;
      left: 52.8%;
      transform: translate(-50%, -50%);
      width: min(32vw, 61vh);
      height: min(32vw, 61vh);
      z-index: 4;
      animation: float 8s ease-in-out infinite;
    }

    .center-visual svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    /* 右侧内容区 */
    .right-content {
      position: absolute;
      top: 58.7%;
      right: 12.6vw;
      transform: translateY(-50%);
      z-index: 10;
    }

    .quote-box {
      position: relative;
      padding-left: 1.65rem;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s both;
    }

    .quote-box::before {
      content: "";
      position: absolute;
      left: 0;
      top: -2rem;
      width: 1px;
      height: 10.8rem;
      background: rgba(17, 20, 60, 0.32);
    }

    .quote-box::after {
      content: "";
      position: absolute;
      left: 0;
      top: -2rem;
      width: 2rem;
      height: 1px;
      background: rgba(17, 20, 60, 0.28);
    }

    .quote-text {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--gray);
      line-height: 1.85;
    }

    .short-line {
      width: 18px;
      height: 2px;
      background-color: var(--violet);
      margin-top: 1.6rem;
    }

    .mini-logo { position: relative; z-index: 100; }
    /* 移动端汉堡按钮 */
    .hamburger-btn {
        display: none; flex-direction: column; justify-content: space-between;
        width: 26px; height: 18px; cursor: pointer; z-index: 100;
        position: relative;
    }
    .hamburger-btn span {
        display: block; height: 2px; width: 100%; background-color: var(--navy);
        border-radius: 2px; transition: all 0.3s ease;
    }
    body.menu-open { overflow: hidden !important; }
    body.menu-open .hamburger-btn span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    body.menu-open .hamburger-btn span:nth-child(2) { opacity: 0; }
    body.menu-open .hamburger-btn span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    @media (max-width: 980px) {

      body,
      html {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .hero-section {
        min-height: 100vh;
        height: auto;
        padding-bottom: 34vh;
      }

      header {
        padding: 1.6rem 1.5rem;
      }

      .hamburger-btn { display: flex; }
      .nav-container {
          position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
          background: rgba(247, 247, 251, 0.92); backdrop-filter: blur(12px);
          flex-direction: column; justify-content: center; align-items: center;
          opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 90;
          gap: 2.5rem;
          margin: 0;
      }
      body.menu-open .nav-container { opacity: 1; pointer-events: auto; }
      .nav-menu { flex-direction: column; align-items: center; gap: 2.5rem; }
      .nav-menu li { font-size: 1.2rem; }

      .left-content {
        position: relative;
        left: auto;
        top: auto;
        transform: none;
        padding: 10rem 1.8rem 0;
      }

      .name-wrapper {
        width: max-content;
      }

      .name-cn {
        font-size: clamp(2.8rem, 12vw, 4.5rem);
      }

      .name-en {
        font-size: clamp(1rem, 4.5vw, 1.2rem);
      }

      .center-visual {
        width: 54vw;
        height: 54vw;
        top: 55%;
        left: 65%;
        opacity: 0.45;
      }

      .right-content {
        display: none;
      }

      #wave-container {
        height: 42vh;
      }
    }
  </style>
</head>

    <div class="glass-beam beam-main-left"></div>

      </div>

      <div class="nav-container">
        <ul class="nav-menu">
          <li class="active">HOME</li>
          <li><a href="/projects">PROJECTS</a></li>

    <!-- 中心Logo -->
    <div class="center-visual">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="-35 -30 535 510" fill="none">
        <defs>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 汉堡菜单交互
      const hamburger = document.querySelector('.hamburger-btn');
      if (hamburger) {
          hamburger.addEventListener('click', () => {
              document.body.classList.toggle('menu-open');
          });
      }

      const svgns = "http://www.w3.org/2000/svg";
      const container = document.getElementById("wave-container");

      let time = 0;
      function buildWaves() {
        container.innerHTML = "";

        const W = window.innerWidth;
        const H = window.innerHeight * 0.58;

        container.setAttribute("viewBox", `0 0 ${W} ${H}`);

        const defs = document.createElementNS(svgns, "defs");

        const glow = document.createElementNS(svgns, "filter");
        glow.setAttribute("id", "waveGlow");
        glow.setAttribute("x", "-10%");
        glow.setAttribute("y", "-40%");
        glow.setAttribute("width", "120%");
        glow.setAttribute("height", "180%");

        const blur = document.createElementNS(svgns, "feGaussianBlur");
        blur.setAttribute("stdDeviation", "2.5");
        blur.setAttribute("result", "blur");

        const merge = document.createElementNS(svgns, "feMerge");
        const m1 = document.createElementNS(svgns, "feMergeNode");
        m1.setAttribute("in", "blur");
        const m2 = document.createElementNS(svgns, "feMergeNode");
        m2.setAttribute("in", "SourceGraphic");

        merge.appendChild(m1);
        merge.appendChild(m2);
        glow.appendChild(blur);
        glow.appendChild(merge);
        defs.appendChild(glow);
        container.appendChild(defs);

        function spline(pts) {
          let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;

          for (let i = 0; i < pts.length - 1; i++) {
            const p0 = pts[Math.max(0, i - 1)];
            const p1 = pts[i];
            const p2 = pts[i + 1];
            const p3 = pts[Math.min(pts.length - 1, i + 2)];

            const c1x = p1[0] + (p2[0] - p0[0]) / 6;
            const c1y = p1[1] + (p2[1] - p0[1]) / 6;
            const c2x = p2[0] - (p3[0] - p1[0]) / 6;
            const c2y = p2[1] - (p3[1] - p1[1]) / 6;

            d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(
              1
            )},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
          }

          return d;
        }

        const NUM = 104;
        const S = 150;

        for (let i = 0; i < NUM; i++) {
          const t = i / (NUM - 1);

          const baseY = H * (1.02 - t * 0.54);
          const amp = H * (0.09 + Math.pow(t, 1.35) * 0.34);

          const cx1 = W * 0.41;
          const s1 = W * 0.115;
          const cx2 = W * 0.72;
          const s2 = W * 0.105;
          const valley = W * 0.56;
          const valleyS = W * 0.09;

          const pts = [];

          for (let j = 0; j <= S; j++) {
            const x = -80 + (j * (W + 160)) / S;

            const g1 = Math.exp(-0.5 * ((x - cx1) / s1) ** 2);
            const g2 = Math.exp(-0.5 * ((x - cx2) / s2) ** 2);
            const gv = Math.exp(-0.5 * ((x - valley) / valleyS) ** 2);

            const leftDip =
              Math.exp(-0.5 * ((x - W * 0.15) / (W * 0.11)) ** 2) *
              H *
              0.12 *
              (0.2 + t);

            const micro =
              Math.sin(x * 0.0065 + t * 5.4 + time) * (1.6 + t * 5.2) +
              Math.sin(x * 0.012 - t * 4.1 + time * 0.5) * (0.7 + t * 3.1);

            const y =
              baseY -
              amp * (g1 * 1.1 + g2 * 0.9) +
              amp * gv * 0.46 +
              leftDip +
              micro;

            pts.push([x, y]);
          }

          const path = document.createElementNS(svgns, "path");
          path.setAttribute("d", spline(pts));
          path.setAttribute("fill", "none");
          path.setAttribute(
            "stroke",
            `rgba(95,84,188,${(0.045 + t * 0.33).toFixed(3)})`
          );
          path.setAttribute("stroke-width", t > 0.72 ? "1.15" : "0.85");

          if (i > 78) {
            path.setAttribute("filter", "url(#waveGlow)");
          }

          container.appendChild(path);
        }

        const fillPath = document.createElementNS(svgns, "path");
        const fillPts = [];

        for (let j = 0; j <= S; j++) {
          const x = -80 + (j * (W + 160)) / S;
          const g1 = Math.exp(-0.5 * ((x - W * 0.41) / (W * 0.115)) ** 2);
          const g2 = Math.exp(-0.5 * ((x - W * 0.72) / (W * 0.105)) ** 2);

          const y =
            H * 0.82 -
            H * 0.22 * g1 -
            H * 0.16 * g2 +
            Math.sin(x * 0.007 + time * 0.8) * 4;

          fillPts.push([x, y]);
        }

        fillPath.setAttribute(
          "d",
          `${spline(fillPts)} L ${W + 120},${H + 60} L -120,${H + 60} Z`
        );
        fillPath.setAttribute("fill", "rgba(95,84,188,0.085)");
        fillPath.setAttribute("filter", "url(#waveGlow)");
        container.insertBefore(fillPath, container.children[1]);

        const dotX = W * 0.5;
        const dotY = H * 0.92;

        // const ring = document.createElementNS(svgns, "circle");
        // ring.setAttribute("cx", dotX);
        // ring.setAttribute("cy", dotY);
        // ring.setAttribute("r", "15");
        // ring.setAttribute("fill", "rgba(255,255,255,0.4)");
        // ring.setAttribute("stroke", "rgba(17,20,60,0.16)");
        // ring.setAttribute("stroke-width", "1");
        // container.appendChild(ring);

        // const dot = document.createElementNS(svgns, "circle");
        // dot.setAttribute("cx", dotX);
        // dot.setAttribute("cy", dotY);
        // dot.setAttribute("r", "5.5");
        // dot.setAttribute("fill", "#11143C");
        // dot.setAttribute("opacity", "0.86");
        // container.appendChild(dot);
      }

      function tick() {
        time += 0.005;
        buildWaves();
        requestAnimationFrame(tick);
      }

      // Initial build and start animation
      buildWaves();
      tick();

      let timer;
      window.addEventListener("resize", () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          buildWaves();
        }, 160);
      });
    });
  </script>
